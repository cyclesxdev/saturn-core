<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saturn - Games</title>

<link rel="icon" href="https://storage-saturn.neocities.org/sicon.png">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial;
}

body {
    background: linear-gradient(135deg, #0f0f14, #1a1a2e, #0f0f14);
    color: white;
}

/* HEADER */
header {
    background: rgba(20,20,30,0.7);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.banner {
    display: block;
    margin: 0 auto;
    max-width: 380px;
    height: 70px;
    object-fit: cover;
}

/* NAV */
nav {
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 15px;
}

nav a {
    color: #aaa;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}

nav a:hover {
    color: white;
}

/* MAIN */
main {
    padding: 40px;
}

/* TITLE */
.title {
    text-align: center;
    margin-bottom: 30px;
}

.title h1 {
    font-size: 28px;
    color: #5865f2;
}

/* GRID */
.games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

/* GAME CARD */
.game-card {
    background: rgba(30,30,45,0.7);
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    transition: 0.3s;
    cursor: pointer;
}

.game-card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(88,101,242,0.5);
}

.game-card img {
    width: 100%;
    border-radius: 8px;
    margin-bottom: 10px;
}

.game-card h4 {
    margin-bottom: 10px;
}

.play-btn {
    padding: 8px 15px;
    background: #5865f2;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.play-btn:hover {
    background: #4752c4;
}
</style>
</head>

<body>

<header>
    <img src="https://storage-saturn.neocities.org/saturnbanner.png" class="banner">

    <nav>
        <a href="/">Home</a>
        <a href="/games">Games</a>
        <a href="/catalog">Catalog</a>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
    </nav>
</header>

<main>

    <div class="title">
        <h1>🎮 Explore Games</h1>
    </div>

    <div class="games-grid">

        <div class="game-card">
            <img src="https://storage-saturn.neocities.org/OH_NOES.png">
            <h4>Obby Escape</h4>
            <button class="play-btn">Play</button>
        </div>

        <div class="game-card">
            <img src="https://storage-saturn.neocities.org/OH_NOES.png">
            <h4>Tycoon World</h4>
            <button class="play-btn">Play</button>
        </div>

        <div class="game-card">
            <img src="https://storage-saturn.neocities.org/OH_NOES.png">
            <h4>Zombie Survival</h4>
            <button class="play-btn">Play</button>
        </div>

        <div class="game-card">
            <img src="https://storage-saturn.neocities.org/OH_NOES.png">
            <h4>Space Adventure</h4>
            <button class="play-btn">Play</button>
        </div>

    </div>

</main>

<script>
if (localStorage.getItem("maintenance") === "true") {
    if (!window.location.pathname.includes("maintenance.html")) {
        window.location.href = "/maintenance.html";
    }
}
</script>

</body>
</html>
